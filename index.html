(()=>{'use strict';const svg=document.getElementById('board'),$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],N='http://www.w3.org/2000/svg';const S={tool:'rect',view:'2d',tab:'entity',shapes:[],profiles:[],selected:[],draft:null,poly:[],arc:[],lasso:null,next:1,multi:false,layers:{shapes:true,lsf:true,labels:true},orbit:{yaw:-.55,pitch:.52,zoom:1,panX:0,panY:0}};function uid(p='O'){return p+(S.next++).toString().padStart(3,'0')}function toast(m){let e=$('#toast');e.textContent=m;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2400)}function nm(k){return({line:'Linha',rect:'Retângulo',circle:'Círculo',arc:'Arco',polygon:'Polígono',profile:'Perfil LSF'})[k]||k}function closed(s){return['rect','circle','polygon'].includes(s.kind)}function all(){return[...S.shapes,...S.profiles]}function get(id){return S.shapes.find(x=>x.id===id)||S.profiles.find(x=>x.id===id)}function pt(e){let r=svg.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function snap(p){return{x:Math.round(p.x/11)*11,y:Math.round(p.y/11)*11}}function bd(s){if(s.kind==='rect')return{x:Math.min(s.a.x,s.b.x),y:Math.min(s.a.y,s.b.y),w:Math.abs(s.b.x-s.a.x),h:Math.abs(s.b.y-s.a.y)}
