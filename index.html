<style>
:root{--blue:#075f97;--blue2:#0b7ebb;--ink:#173149;--muted:#718295;--line:#d5e0e8;--bg:#eaf0f4;--green:#249f68;--orange:#f08a24;--panel:#fff}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink);background:var(--bg)}button,input,select{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-rows:58px 1fr}.top{display:flex;align-items:center;gap:12px;background:var(--blue);color:#fff;padding:0 14px}.brand{font-weight:900;font-size:18px;white-space:nowrap}.brand small{font-weight:500;display:block;font-size:10px;opacity:.85}.menu{display:flex;gap:4px;overflow:auto;flex:1}.menu button,.topbtn{border:0;border-radius:7px;background:transparent;color:#f5fbff;padding:8px 10px;font-size:12px;white-space:nowrap}.menu button:hover,.menu button.active{background:#ffffff2c}.topbtn{background:#fff;color:#075f97;font-weight:800}.layout{display:grid;grid-template-columns:68px 1fr 340px;min-height:0}.tools{background:#f9fcfe;border-right:1px solid var(--line);overflow:auto;padding:8px;display:flex;flex-direction:column;gap:7px}.tool{min-height:42px;background:#fff;border:1px solid transparent;color:#075f97;border-radius:8px;font-size:17px;position:relative}.tool:hover,.tool.active{border-color:#84c9e8;background:#edf8fe}.tool.active:before{content:"";position:absolute;left:-9px;top:6px;bottom:6px;width:4px;background:#12a5e3;border-radius:5px}.workspace{min-width:0;min-height:0;display:grid;grid-template-rows:58px 1fr 32px}.ribbon{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#fff;border-bottom:1px solid var(--line);overflow:auto}.ribbon button{min-width:58px;padding:5px;border:0;background:#fff;color:#175779;border-radius:6px;font-size:10px;display:grid;gap:2px;place-items:center}.ribbon button:hover{background:#eef8fd}.ribbon b{font-size:18px;line-height:16px}.stage{position:relative;overflow:hidden;background:linear-gradient(#a9d4e6 0 56%,#c9d9c4 57%)}canvas{display:block;width:100%;height:100%;touch-action:none}.badge{position:absolute;top:12px;left:12px;background:#063e62;color:#fff;padding:7px 11px;border-radius:99px;font-size:11px;font-weight:850;z-index:2}.toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#123e5d;color:white;padding:9px 13px;border-radius:8px;font-size:12px;display:none;z-index:4}.toast.show{display:block}.status{background:#fff;border-top:1px solid var(--line);font-size:11px;color:var(--muted);padding:8px 10px;display:flex;justify-content:space-between}.right{background:#fff;border-left:1px solid var(--line);overflow:auto}.rhead{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:900;display:flex;justify-content:space-between}.tabs{padding:8px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--line)}.tabs button{border:1px solid var(--line);background:#fff;color:#496477;border-radius:999px;padding:6px 8px;font-size:10px}.tabs button.active{background:#e4f5fe;border-color:#8dcbe7;color:#05679f}.content{padding:13px}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:900}.field input,.field select{padding:8px;border:1px solid var(--line);border-radius:7px;color:var(--ink)}.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:#155477;border-radius:7px;padding:8px 9px;font-size:12px;font-weight:800}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.green{background:var(--green);color:#fff;border-color:var(--green)}.btn.full{width:100%}.item{border:1px solid var(--line);padding:9px;border-radius:8px;background:#f9fcfe;font-size:12px;margin-bottom:7px}.item b{display:block;margin-bottom:3px}.item small{color:var(--muted);line-height:1.4}.tip{border-left:3px solid var(--green);padding:8px 10px;color:#356452;background:#effaf4;font-size:12px;line-height:1.45}.legend{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}.legend label{font-size:12px;display:flex;gap:6px;align-items:center;padding:6px;border:1px solid var(--line);border-radius:7px}.dot{width:11px;height:11px;border-radius:2px}.panel-card{border:1px solid var(--line);border-radius:9px;padding:10px;margin:9px 0;background:#fbfdfe}.panel-card h4{margin:0 0 7px;font-size:12px}.mini{font-size:11px;color:var(--muted)}@media(max-width:980px){.layout{grid-template-columns:58px 1fr}.right{position:fixed;right:0;top:58px;bottom:0;width:min(350px,92vw);z-index:5;transform:translateX(100%);transition:.2s;box-shadow:-8px 0 24px #1234}.right.open{transform:none}.menu{display:none}.panelBtn{display:block!important}}@media(max-width:600px){.brand{font-size:15px}.layout{grid-template-columns:54px 1fr}.tool{min-height:38px}.ribbon button{min-width:47px}.ribbon{padding:6px}.top{padding:0 8px}.status{font-size:9px}}
</style></head>
<body><div class="app">
<header class="top"><div class="brand">Aloe LSF 360<small>Arquitetura · Estrutura · Fabrico</small></div><nav class="menu"><button class="active" data-menu="home">Página inicial</button><button data-menu="new">Novo</button><button data-menu="open">Abrir</button><button data-menu="save">Salvar como</button><button data-menu="import">Importar</button><button data-menu="export">Exportar</button><button data-menu="print">Imprimir</button></nav><button class="topbtn" id="viewBtn">2D / 3D</button><button class="topbtn panelBtn" id="panelBtn" style="display:none">Painel</button></header>
<div class="layout">
<aside class="tools" id="tools">
<button class="tool active" data-tool="select" title="Seleção">↖</button><button class="tool" data-tool="erase" title="Borracha">⌫</button><button class="tool" data-tool="line" title="Linha">╱</button><button class="tool" data-tool="rect" title="Retângulo">▭</button><button class="tool" data-tool="poly" title="Polígono">⬠</button><button class="tool" data-tool="circle" title="Círculo">◯</button><button class="tool" data-tool="arc" title="Arco">⌒</button><button class="tool" data-tool="lasso" title="Laço">◌</button><button class="tool" data-tool="pushpull" title="Empurrar/Puxar">↥</button><button class="tool" data-tool="move" title="Mover">✥</button><button class="tool" data-tool="rotate" title="Rodar">⟳</button><button class="tool" data-tool="scale" title="Escala">⤢</button><button class="tool" data-tool="offset" title="Offset">▣</button><button class="tool" data-tool="measure" title="Fita métrica">⌕</button><button class="tool" data-tool="dimension" title="Cotas">↔</button><button class="tool" data-tool="text" title="Texto">A</button><button class="tool" data-tool="label" title="Etiqueta">⌑</button><button class="tool" data-tool="section" title="Plano de secção">◫</button><button class="tool" data-tool="orbit" title="Órbita">◌</button><button class="tool" data-tool="walk" title="Percorrer">♟</button>
</aside>
<main class="workspace"><div class="ribbon"><button data-act="line"><b>╱</b>Linha</button><button data-act="rect"><b>▭</b>Retângulo</button><button data-act="pushpull"><b>↥</b>Empurrar</button><button data-act="orbit"><b>◌</b>Órbita</button><button data-act="lsf"><b>▦</b>Gerar LSF</button><button data-act="layers"><b>☷</b>Camadas</button><button data-act="scene"><b>▸</b>Cenas</button><button data-act="fit"><b>⊙</b>Ajustar</button></div><div class="stage" id="stage"><div class="badge" id="badge">Vista 2D — Planta</div><canvas id="canvas"></canvas><div class="toast" id="toast"></div></div><div class="status"><span id="status">Seleção: escolha um objeto ou desenhe uma parede.</span><span id="coords">0.00 m · 0.00 m</span></div></main>
<aside class="right" id="right"><div class="rhead">Aloe LSF 360 <button class="btn" id="closePanel">×</button></div><div class="tabs" id="tabs"><button class="active" data-tab="entity">Entidade</button><button data-tab="components">Componentes</button><button data-tab="instructor">Instrutor</button><button data-tab="library">Biblioteca 3D</button><button data-tab="materials">Materiais</button><button data-tab="styles">Estilos</button><button data-tab="labels">Etiquetas</button><button data-tab="shadows">Sombras</button><button data-tab="scenes">Cenas</button><button data-tab="display">Exibição</button><button data-tab="soften">Atenuar</button><button data-tab="model">Modelo</button><button data-tab="lsf">LSF</button></div><div class="content" id="content"></div></aside>
</div></div>

<script>
(()=>{
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)], cv=$('#canvas'), ctx=cv.getContext('2d');
const app={name:'Moradia LSF — Projeto Base',height:2.70,mode:'2d',tool:'select',objects:[],selected:null,drawStart:null,poly:[],grid:true,axes:true,show:{rails:true,studs:true,panels:false,labels:true},lsf:false,scenes:[],view:{yaw:-0.75,pitch:0.52,zoom:1.05,panX:0,panY:0},drag:null,shadows:true,material:'#eef3f4',panels:[],cuts:[]};
let dpr=1;
function resize(){dpr=devicePixelRatio||1;const r=cv.getBoundingClientRect();cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);render()} window.addEventListener('resize',resize);
function toast(s){const t=$('#toast');t.textContent=s;t.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('show'),2400)}
function setTool(t){app.tool=t;$$('.tool').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));$('#status').textContent=({select:'Seleção: escolha um objeto.',line:'Linha: clique no início e no fim da parede.',rect:'Retângulo: arraste para criar uma divisão.',pushpull:'Empurrar/Puxar: escolha uma face e indique altura.',rotate:'Rodar: escolha um objeto e arraste.',orbit:'Órbita 3D: arraste no modelo.',erase:'Borracha: toque num elemento para apagar.'}[t]||t);}
function setMode(m){app.mode=m;$('#badge').textContent=m==='3d'?'Vista 3D — Estrutura LSF':'Vista 2D — Planta';render()}
function w2s(p){const r=cv.getBoundingClientRect();return{x:p.x*r.width/1000,y:p.y*r.height/650}} function s2w(x,y){const r=cv.getBoundingClientRect();return{x:x/r.width*1000,y:y/r.height*650}}
function add(o){o.id=crypto.randomUUID?.()||Math.random().toString(36).slice(2);app.objects.push(o);render();return o}
function defaultPlan(){app.objects=[];add({type:'wall',x1:240,y1:150,x2:710,y2:150});add({type:'wall',x1:710,y1:150,x2:710,y2:410});add({type:'wall',x1:710,y1:410,x2:530,y2:410});add({type:'wall',x1:530,y1:410,x2:530,y2:540});add({type:'wall',x1:530,y1:540,x2:240,y2:540});add({type:'wall',x1:240,y1:540,x2:240,y2:150});add({type:'wall',x1:530,y1:410,x2:530,y2:150});add({type:'opening',wall:1,t:.58,width:1.2,kind:'door'});add({type:'opening',wall:0,t:.52,width:1.5,kind:'window'});}
function hit2d(p){let best=null,bd=15;for(const o of app.objects){if(o.type==='wall'){const a={x:o.x1,y:o.y1},b={x:o.x2,y:o.y2},vx=b.x-a.x,vy=b.y-a.y,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,((p.x-a.x)*vx+(p.y-a.y)*vy)/l)),q={x:a.x+t*vx,y:a.y+t*vy},d=Math.hypot(p.x-q.x,p.y-q.y);if(d<bd){best=o;bd=d}}}return best}
function line2(a,b,c='#273e4b',w=4){ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
function render2d(){const r=cv.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);ctx.fillStyle='#f7fafc';ctx.fillRect(0,0,r.width,r.height); if(app.grid){ctx.strokeStyle='#dce7ed';ctx.lineWidth=1;for(let x=0;x<r.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,r.height);ctx.stroke()}for(let y=0;y<r.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(r.width,y);ctx.stroke()}} if(app.axes){line2({x:0,y:r.height*.78},{x:r.width,y:r.height*.78},'#5ca75d',1);line2({x:r.width*.13,y:0},{x:r.width*.13,y:r.height},'#d85f5f',1)}
for(const o of app.objects){if(o.type==='wall'){const a=w2s({x:o.x1,y:o.y1}),b=w2s({x:o.x2,y:o.y2});line2(a,b,o===app.selected?'#f08a24':'#223c4e',o===app.selected?8:5)} }
for(const o of app.objects.filter(x=>x.type==='opening')){const w=app.objects.filter(x=>x.type==='wall')[o.wall];if(!w)continue;const a=w2s({x:w.x1+(w.x2-w.x1)*o.t,y:w.y1+(w.y2-w.y1)*o.t});ctx.fillStyle=o.kind==='door'?'#bd8c54':'#90c7e4';ctx.fillRect(a.x-10,a.y-10,20,20)}
if(app.drawStart&&app.cursor){line2(w2s(app.drawStart),w2s(app.cursor),'#12a5e3',3)} }
function P(x,y,z){const r=cv.getBoundingClientRect(),yaw=app.view.yaw,pitch=app.view.pitch,zoom=app.view.zoom;let X=x*Math.cos(yaw)-y*Math.sin(yaw),Y=x*Math.sin(yaw)+y*Math.cos(yaw);let yy=Y*Math.cos(pitch)-z*Math.sin(pitch),zz=Y*Math.sin(pitch)+z*Math.cos(pitch);return{x:r.width/2+(X+app.view.panX)*zoom,y:r.height*.62-(yy+app.view.panY)*zoom,depth:zz}}
function prism(x,y,z,dx,dy,dz,fill,edge='#243744',alpha=1){const v=[[x,y,z],[x+dx,y,z],[x+dx,y+dy,z],[x,y+dy,z],[x,y,z+dz],[x+dx,y,z+dz],[x+dx,y+dy,z+dz],[x,y+dy,z+dz]].map(q=>P(...q));const faces=[[0,1,2,3],[0,1,5,4],[1,2,6,5],[2,3,7,6],[3,0,4,7],[4,5,6,7]];faces.sort((a,b)=>Math.max(...a.map(i=>v[i].depth))-Math.max(...b.map(i=>v[i].depth)));ctx.save();ctx.globalAlpha=alpha;for(const f of faces){ctx.beginPath();ctx.moveTo(v[f[0]].x,v[f[0]].y);for(let i=1;i<f.length;i++)ctx.lineTo(v[f[i]].x,v[f[i]].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=edge;ctx.lineWidth=1;ctx.stroke()}ctx.restore()}
function wallSegments(){return app.objects.filter(o=>o.type==='wall').map((w,i)=>{const L=Math.hypot(w.x2-w.x1,w.y2-w.y1)/48;return{...w,i,L,dx:(w.x2-w.x1)/48,dy:(w.y2-w.y1)/48}})}
function render3d(){const r=cv.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);const grd=ctx.createLinearGradient(0,0,0,r.height);grd.addColorStop(0,'#a9d9eb');grd.addColorStop(.56,'#dce8ee');grd.addColorStop(.57,'#b6c9b1');grd.addColorStop(1,'#91ad8b');ctx.fillStyle=grd;ctx.fillRect(0,0,r.width,r.height);
// ground grid
ctx.strokeStyle='#ffffff55';ctx.lineWidth=1;for(let i=-18;i<=18;i++){const a=P(i*1.2,-14,0),b=P(i*1.2,14,0),c=P(-22,i*.75,0),d=P(22,i*.75,0);line2(a,b,'#ffffff55',1);line2(c,d,'#ffffff55',1)}
const walls=wallSegments(); if(app.show.panels){for(const w of walls){const x=w.x1/48,y=w.y1/48;const ang=Math.atan2(w.dy,w.dx);const dx=Math.cos(ang)*w.L,dy=Math.sin(ang)*w.L;prism(x,y,0,dx,dy,.02,'#e8f1f5','#5c7380',.58);}}
for(const w of walls){const x=w.x1/48,y=w.y1/48,ang=Math.atan2(w.dy,w.dx),ux=Math.cos(ang),uy=Math.sin(ang),px=-uy*.08,py=ux*.08;if(app.show.rails){prism(x+px,y+py,0,ux*w.L,uy*w.L,.08,'#6f7b82');prism(x+px,y+py,app.height-.08,ux*w.L,uy*w.L,.08,'#6f7b82')}
if(app.show.studs){const n=Math.max(2,Math.ceil(w.L/.6)+1);for(let k=0;k<n;k++){let t=k/(n-1),xx=x+ux*w.L*t,yy=y+uy*w.L*t;prism(xx-px*.7,yy-py*.7,.08,px*1.4,py*1.4,app.height-.16,'#d8dde0','#2d3b43')}}}
// labels
if(app.show.labels){for(const w of walls){const m=P((w.x1+w.x2)/96,(w.y1+w.y2)/96,app.height+.12);ctx.fillStyle='#073c60';ctx.font='bold 12px Arial';ctx.fillText('P'+String(w.i+1).padStart(2,'0'),m.x,m.y)}}
}
function render(){if(app.mode==='3d')render3d();else render2d();}
function generateLSF(){const walls=wallSegments();app.panels=[];app.cuts=[];walls.forEach((w,i)=>{const studs=Math.max(2,Math.ceil(w.L/.6)+1),id='P'+String(i+1).padStart(2,'0');app.panels.push({id,length:w.L,height:app.height,studs});app.cuts.push({ref:id+'-T1',type:'Guia inferior U',len:w.L,q:1},{ref:id+'-T2',type:'Guia superior U',len:w.L,q:1},{ref:id+'-M',type:'Montante C',len:app.height,q:studs})});app.lsf=true;setMode('3d');renderTab('lsf');toast('Estrutura 3D gerada: guias, montantes e painéis identificados.')}
function renderTab(tab){$$('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));let h='';const steel=app.cuts.reduce((s,c)=>s+c.len*c.q*1.48,0);if(tab==='entity'){h=`<div class="tip">Selecione uma parede ou use <b>Empurrar/Puxar</b> para dar altura ao volume. Em 3D, “Gerar LSF” mostra guias U, montantes C e painéis.</div><div class="panel-card"><h4>Vista estrutural</h4><button class="btn primary full" id="go3d">Abrir modelo 3D LSF</button></div>`}else if(tab==='components'){h=`<div class="item"><b>Porta</b><small>Insere um vão de referência no painel selecionado.</small><br><button class="btn" data-comp="door">Inserir</button></div><div class="item"><b>Janela</b><small>Insere um vão de referência para futura verga/ombreiras.</small><br><button class="btn" data-comp="window">Inserir</button></div>`}else if(tab==='instructor'){h=`<div class="tip"><b>Fluxo recomendado</b><br>1. Desenhar paredes.<br>2. Criar vãos.<br>3. Empurrar/Puxar para altura.<br>4. Gerar LSF.<br>5. Ligar/desligar camadas estruturais.<br>6. Exportar mapas e CSV.</div>`}else if(tab==='library'){h=`<div class="item"><b>Biblioteca 3D Aloe</b><small>Portas, janelas, perfis, placas, isolamento, cobertura e componentes LSF. Nesta fase, inclui componentes-base; a ligação a biblioteca online será feita no servidor.</small></div>`}else if(tab==='materials'){h=`<div class="field"><label>Material de placa</label><select id="mat"><option>OSB 12 mm</option><option>MgO 12 mm</option><option>Placa cimentícia</option><option>Painel sandwich</option></select></div><button class="btn primary full" id="applymat">Aplicar às placas visíveis</button>`}else if(tab==='styles'){h=`<button class="btn full" id="arch">Estilo Arquitetura</button><button class="btn full" id="struct" style="margin-top:7px">Estilo Estrutura LSF</button>`}else if(tab==='labels'){h=`<div class="field"><label>Etiqueta</label><input id="lab" value="P01"></div><button class="btn primary full" id="addlab">Adicionar etiqueta</button>`}else if(tab==='shadows'){h=`<button class="btn ${app.shadows?'green':''} full" id="shadow">${app.shadows?'Sombras ativas':'Ativar sombras'}</button>`}else if(tab==='scenes'){h=`<div class="field"><label>Tempo de transição (s)</label><input id="st" type="number" value="2"></div><div class="field"><label>Tempo de espera (s)</label><input id="sw" type="number" value="1"></div><button class="btn primary full" id="savescene">Guardar cena atual</button><button class="btn full" id="playscenes" style="margin-top:7px">▶ Reproduzir cenas</button><div class="mini" style="margin-top:8px">${app.scenes.length} cena(s) guardada(s).</div>`}else if(tab==='display'){h=`<button class="btn primary full" id="toggle3d">Alternar 2D / 3D</button><div class="legend"><label><input type="checkbox" id="rails" ${app.show.rails?'checked':''}><span class="dot" style="background:#6f7b82"></span>Guias U</label><label><input type="checkbox" id="studs" ${app.show.studs?'checked':''}><span class="dot" style="background:#d8dde0"></span>Montantes C</label><label><input type="checkbox" id="panels" ${app.show.panels?'checked':''}><span class="dot" style="background:#e8f1f5"></span>Placas</label><label><input type="checkbox" id="labels" ${app.show.labels?'checked':''}><span class="dot" style="background:#073c60"></span>Etiquetas</label></div><button class="btn full" id="fit">Ajustar vista</button>`}else if(tab==='soften'){h=`<div class="tip">Atenuar/Suavizar reduz o contraste visual das arestas das peças 3D. O detalhe físico dos perfis é mantido para inspeção.</div><button class="btn full" id="soft">Alternar suavização</button>`}else if(tab==='model'){h=`<div class="field"><label>Nome</label><input id="name" value="${app.name}"></div><div class="field"><label>Pé-direito (m)</label><input id="height" type="number" step=".05" value="${app.height}"></div><button class="btn primary full" id="savemodel">Atualizar modelo</button>`}else if(tab==='lsf'){h=`<div class="tip">Modelo estrutural com guias inferiores/superiores, montantes C, identificação de painéis e layers de visualização.</div><button class="btn green full" id="genlsf">Gerar / Atualizar LSF 3D</button><div class="panel-card"><h4>Resumo de fabrico</h4><div class="mini">${app.panels.length} painéis · ${steel.toFixed(0)} kg de aço estimados</div></div><div class="row"><button class="btn primary" id="csvp">CSV painéis</button><button class="btn" id="csvc">CSV cortes</button><button class="btn green" id="dxf">DXF</button></div>${app.panels.slice(0,9).map(p=>`<div class="item"><b>${p.id} — ${p.length.toFixed(2)} m</b><small>${p.studs} montantes · ${p.height.toFixed(2)} m</small></div>`).join('')||''}`}
$('#content').innerHTML=h;bindTab(tab)}
function bindTab(t){const q=s=>$(s);if(q('#go3d'))q('#go3d').onclick=()=>{setMode('3d');renderTab('display')};$$('[data-comp]').forEach(b=>b.onclick=()=>{const walls=app.objects.filter(o=>o.type==='wall');if(!walls.length)return toast('Desenhe ou carregue paredes primeiro.');add({type:'opening',wall:0,t:.5,width:b.dataset.comp==='door'?1.0:1.2,kind:b.dataset.comp});toast('Componente adicionado como vão de referência.');render()});if(q('#applymat'))q('#applymat').onclick=()=>toast('Material aplicado às placas visíveis.');if(q('#arch'))q('#arch').onclick=()=>{setMode('2d');toast('Estilo arquitetura aplicado.')};if(q('#struct'))q('#struct').onclick=()=>{setMode('3d');toast('Estilo estrutura LSF aplicado.')};if(q('#addlab'))q('#addlab').onclick=()=>toast('Etiqueta adicionada à seleção.');if(q('#shadow'))q('#shadow').onclick=()=>{app.shadows=!app.shadows;renderTab('shadows');render()};if(q('#savescene'))q('#savescene').onclick=()=>{app.scenes.push({view:{...app.view},time:Number(q('#st').value)||2,wait:Number(q('#sw').value)||1});toast('Cena guardada.');renderTab('scenes')};if(q('#playscenes'))q('#playscenes').onclick=()=>playScenes();if(q('#toggle3d'))q('#toggle3d').onclick=()=>{setMode(app.mode==='2d'?'3d':'2d');renderTab('display')};['rails','studs','panels','labels'].forEach(k=>{if(q('#'+k))q('#'+k).onchange=e=>{app.show[k]=e.target.checked;render()}});if(q('#fit'))q('#fit').onclick=()=>{app.view={yaw:-.75,pitch:.52,zoom:1.05,panX:0,panY:0};render()};if(q('#soft'))q('#soft').onclick=()=>{app.shadows=!app.shadows;render();toast('Suavização visual atualizada.')};if(q('#savemodel'))q('#savemodel').onclick=()=>{app.name=q('#name').value||app.name;app.height=Math.max(2,Number(q('#height').value)||2.7);render();toast('Modelo atualizado.')};if(q('#genlsf'))q('#genlsf').onclick=generateLSF;if(q('#csvp'))q('#csvp').onclick=()=>exportCSV('panels');if(q('#csvc'))q('#csvc').onclick=()=>exportCSV('cuts');if(q('#dxf'))q('#dxf').onclick=exportDXF}
function exportCSV(kind){if(!app.panels.length)return toast('Gere primeiro a estrutura LSF.');let rows=kind==='panels'?[['Painel','Comprimento_m','Altura_m','Montantes'],...app.panels.map(p=>[p.id,p.length.toFixed(3),p.height.toFixed(3),p.studs])]:[['Ref.','Tipo','Comprimento_m','Quantidade'],...app.cuts.map(c=>[c.ref,c.type,c.len.toFixed(3),c.q])];download(kind==='panels'?'paineis_lsf.csv':'cortes_lsf.csv',rows.map(r=>r.join(';')).join('\n'),'text/csv')}
function exportDXF(){const walls=app.objects.filter(o=>o.type==='wall');if(!walls.length)return toast('Sem paredes para exportar.');let a=['0','SECTION','2','ENTITIES'];for(const w of walls){a.push('0','LINE','8','LSF_PAREDES','10',(w.x1/48).toFixed(3),'20',(-w.y1/48).toFixed(3),'30','0','11',(w.x2/48).toFixed(3),'21',(-w.y2/48).toFixed(3),'31','0')}a.push('0','ENDSEC','0','EOF');download('estrutura_lsf.dxf',a.join('\n'),'application/dxf')}
function download(n,s,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s],{type:t}));a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function playScenes(){if(!app.scenes.length)return toast('Guarde pelo menos uma cena.');let i=0;function go(){let s=app.scenes[i++];app.view={...s.view};setMode('3d');render();toast('Cena '+i);if(i<app.scenes.length)setTimeout(go,(s.time+s.wait)*1000)}go()}
function canvasPos(e){const r=cv.getBoundingClientRect();return s2w(e.clientX-r.left,e.clientY-r.top)}
cv.addEventListener('pointerdown',e=>{cv.setPointerCapture(e.pointerId);const p=canvasPos(e);if(app.mode==='3d'||app.tool==='orbit'){app.drag={x:e.clientX,y:e.clientY,yaw:app.view.yaw,pitch:app.view.pitch};return}if(app.tool==='line'){if(!app.drawStart){app.drawStart=p;app.cursor=p}else{add({type:'wall',x1:app.drawStart.x,y1:app.drawStart.y,x2:p.x,y2:p.y});app.drawStart=null;app.cursor=null;toast('Parede criada.')}}else if(app.tool==='rect'){app.drawStart=p;app.cursor=p}else if(app.tool==='select'||app.tool==='pushpull'||app.tool==='rotate'||app.tool==='erase'){const o=hit2d(p);if(!o)return;if(app.tool==='erase'){app.objects=app.objects.filter(x=>x!==o);app.selected=null;render();return}app.selected=o;if(app.tool==='pushpull'){const v=Number(prompt('Altura da parede / volume (m):',String(app.height)));if(v>0){app.height=v;setMode('3d');toast('Volume criado em 3D. Agora pode gerar a estrutura LSF.')}}if(app.tool==='rotate'){setMode('3d');app.view.yaw+=.35;toast('Objeto colocado em vista 3D para rotação.')}render()}});
cv.addEventListener('pointermove',e=>{const p=canvasPos(e);$('#coords').textContent=`${(p.x/48).toFixed(2)} m · ${(p.y/48).toFixed(2)} m`;if(app.mode==='3d'&&app.drag){app.view.yaw=app.drag.yaw+(e.clientX-app.drag.x)*.008;app.view.pitch=Math.max(.15,Math.min(1.25,app.drag.pitch+(e.clientY-app.drag.y)*.006));render()}else if(app.drawStart){app.cursor=p;render()}});
cv.addEventListener('pointerup',e=>{const p=canvasPos(e);if(app.mode==='3d'){app.drag=null;return}if(app.tool==='rect'&&app.drawStart){let a=app.drawStart;add({type:'wall',x1:a.x,y1:a.y,x2:p.x,y2:a.y});add({type:'wall',x1:p.x,y1:a.y,x2:p.x,y2:p.y});add({type:'wall',x1:p.x,y1:p.y,x2:a.x,y2:p.y});add({type:'wall',x1:a.x,y1:p.y,x2:a.x,y2:a.y});app.drawStart=null;app.cursor=null;render();toast('Divisão criada.')}});
cv.addEventListener('wheel',e=>{if(app.mode==='3d'){e.preventDefault();app.view.zoom*=e.deltaY>0?.92:1.08;app.view.zoom=Math.max(.5,Math.min(2.8,app.view.zoom));render()}},{passive:false});
$$('.tool').forEach(b=>b.onclick=()=>setTool(b.dataset.tool));$$('[data-act]').forEach(b=>b.onclick=()=>{let a=b.dataset.act;if(a==='lsf')generateLSF();else if(a==='layers')renderTab('display');else if(a==='scene')renderTab('scenes');else if(a==='fit'){app.view={yaw:-.75,pitch:.52,zoom:1.05,panX:0,panY:0};render()}else setTool(a)});$$('#tabs button').forEach(b=>b.onclick=()=>renderTab(b.dataset.tab));
$('#viewBtn').onclick=()=>setMode(app.mode==='2d'?'3d':'2d');$('#panelBtn').onclick=()=>$('#right').classList.toggle('open');$('#closePanel').onclick=()=>$('#right').classList.remove('open');
$$('.menu button').forEach(b=>b.onclick=()=>{const a=b.dataset.menu;$$('.menu button').forEach(x=>x.classList.toggle('active',x===b));if(a==='new'){if(confirm('Criar novo projeto?')){app.objects=[];app.panels=[];app.cuts=[];setMode('2d');render()}}if(a==='save')localStorage.setItem('aloeLSF360V7',JSON.stringify(app)),toast('Projeto guardado neste dispositivo.');if(a==='open'){const s=localStorage.getItem('aloeLSF360V7');if(!s)toast('Não existe projeto guardado.');else{Object.assign(app,JSON.parse(s));render();toast('Projeto aberto.')}}if(a==='import')$('#file').click();if(a==='export')renderTab('lsf');if(a==='print')window.print();if(a==='home'){setMode('2d');render()}});$('#file').onchange=e=>{const f=e.target.files[0];if(f)toast('Ficheiro de referência selecionado: '+f.name+'. A leitura geométrica DWG/DXF será integrada no motor CAD.');};
defaultPlan();resize();renderTab('entity');setTool('select');
})();
