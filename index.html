<!doctype html><html lang="pt-PT"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aloe LSF 360 — Base Técnica V1</title><link rel="stylesheet" href="style.css"></head><body>
<div class="app"><header><div class="brand"><span class="leaf">✦</span><b>Aloe <em>LSF 360</em></b><small>Arquitetura · Estrutura · Fabrico</small></div><nav id="menu"><button data-a="new">Novo</button><button data-a="open">Abrir</button><button data-a="save">Salvar como</button><button data-a="import">Importar</button><button data-a="export">Exportar</button><button data-a="location">Localização</button><button data-a="print">Imprimir</button></nav><button id="topView">2D / 3D</button></header>
<div class="toolbar"><button data-t="select">⌖<span>Selecionar</span></button><button data-t="line">╱<span>Linha</span></button><button data-t="rect" class="on">▭<span>Retângulo</span></button><button data-t="circle">◯<span>Círculo</span></button><button data-t="arc">◠<span>Arco</span></button><button data-t="polygon">⬠<span>Polígono</span></button><button data-t="lasso">◌<span>Laço</span></button><button id="push">↕<span>Empurrar/Puxar</span></button><button id="move">✥<span>Mover</span></button><button id="rotate">↻<span>Rodar</span></button><button id="orbit">◉<span>Órbita</span></button><button id="erase">⌫<span>Apagar</span></button><button id="lsf" class="green">▦<span>Gerar LSF</span></button><button id="csv" class="green">CSV<span>Gerar CSV</span></button><button id="fit">◎<span>Ajustar 3D</span></button></div>
<main><aside class="left"><button data-t="select">⌖<small>Selecionar</small></button><button data-t="line">╱<small>Linha</small></button><button data-t="rect">▭<small>Retângulo</small></button><button data-t="polygon">⬠<small>Polígono</small></button><button data-t="circle">◯<small>Círculo</small></button><button data-t="arc">◠<small>Arco</small></button><button data-t="lasso">◌<small>Laço</small></button><button id="leftMove">✥<small>Mover</small></button><button id="leftOrbit">◉<small>Órbita</small></button><button id="leftErase">⌫<small>Apagar</small></button></aside>

<aside class="right"><div class="rhead"><b>Aloe LSF 360</b></div><div class="tabs"><button class="tab on" data-tab="entity">Entidade</button><button class="tab" data-tab="selection">Seleção</button><button class="tab" data-tab="profiles">Perfis</button><button class="tab" data-tab="geo">Geolocalização</button><button class="tab" data-tab="csvtab">CSV</button></div><div id="panel"></div></aside></main>
<footer><span id="coords">X: 0.000 · Y: 0.000 · Z: 0.000</span><span id="tool">Ferramenta: Retângulo</span><span id="status">Nenhum objeto selecionado.</span></footer></div>
<input id="file" type="file" accept=".json,.png,.jpg,.jpeg,.dxf" hidden>
